name: 手动打包 LabelMe 工具箱

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-exe:
    name: 打包 Windows 单文件 EXE
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 使用 PyInstaller 打包
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "LabelMe工具箱" --icon assets/app_icon.ico --add-data "assets;assets" main.py

      - name: 上传 EXE 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LabelMe工具箱-windows-exe
          path: dist/LabelMe工具箱.exe
          if-no-files-found: error

  build-region-submission-counter-exe:
    name: 打包 Windows 临时行政区统计 EXE
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 使用 PyInstaller 打包临时统计工具
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "行政区提交配对统计" --icon assets/app_icon.ico region_submission_counter_app.py

      - name: 上传临时 EXE 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 行政区提交配对统计-windows-exe
          path: dist/行政区提交配对统计.exe
          if-no-files-found: error
